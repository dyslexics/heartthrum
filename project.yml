name: Heartthrum
options:
  bundleIdPrefix: de.dvld
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
targets:
  Heartthrum:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.dvld.heartthrum
        PRODUCT_NAME: Heartthrum
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "7"
        DEVELOPMENT_TEAM: FQZ492F2YC
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "de.dvld.heartthrum AppStore"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Heartthrum
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleLocalizations: [en, de]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Heartthrum uses the camera to measure your pulse from your fingertip. No photos or videos are recorded or stored."
        NSHealthUpdateUsageDescription: "Heartthrum can save your measured heart rate to Apple Health if you choose to."
        NSHealthShareUsageDescription: "Heartthrum only writes your measured heart rate to Apple Health. It does not read any health data."
    entitlements:
      path: Sources/Heartthrum.entitlements
      properties:
        com.apple.developer.healthkit: true
